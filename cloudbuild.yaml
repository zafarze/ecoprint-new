steps:
  # 1. Собираем образ Docker из папки backend
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend'
    args: 
      - 'build'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ecoprint-new/ecoprint-api:$COMMIT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'

  # 2. Отправляем собранный образ в кэш Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ecoprint-new/ecoprint-api:$COMMIT_SHA'

  # 3. АВТОМАТИЧЕСКИ обновляем сервер Cloud Run новым кодом
  # --min-instances=1 держит контейнер постоянно горячим: запросы отвечают
  # за миллисекунды, никаких "холодных стартов" по 30-60 сек. Стоит ~$5-10/мес.
  # Секреты подтягиваются из Google Secret Manager — НЕ хранить в env vars
  # plaintext (любой кто видит описание сервиса видел бы их). Сами секреты
  # создаются вручную через `gcloud secrets create`; здесь только маунтим их.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ecoprint-api'
      - '--image'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ecoprint-new/ecoprint-api:$COMMIT_SHA'
      - '--region'
      - 'europe-west3'
      - '--min-instances=1'
      - '--set-env-vars=RUN_ON_CLOUD_RUN=True,CLOUD_SQL_CONNECTION_NAME=eco-print-489700:us-central1:ecoprint-db,DB_NAME=ecoprint_v2,DB_USER=postgres,GCS_BUCKET_NAME=ecoprint-media'
      - '--set-secrets=SECRET_KEY=django-secret-key:latest,DB_PASSWORD=db-password:latest,GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_CREDS_JSON=google-creds-json:latest'

images:
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ecoprint-new/ecoprint-api:$COMMIT_SHA'
